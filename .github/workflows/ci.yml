name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: typecheck · lint · test · build
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run validate

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Build and publish to npm + GitHub Packages
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run lint
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build BrewBar.app and create GitHub Release
  build-brewbar:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Tuist
        run: brew install tuist
      - name: Generate Xcode project
        working-directory: menubar
        run: tuist generate

      # REL-002: Archive instead of build for proper release artifacts
      - name: Archive BrewBar
        run: |
          xcodebuild archive \
            -workspace menubar/BrewBar.xcworkspace \
            -scheme BrewBar \
            -configuration Release \
            -archivePath menubar/build/BrewBar.xcarchive \
            -derivedDataPath menubar/build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            ONLY_ACTIVE_ARCH=NO

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath menubar/build/BrewBar.xcarchive \
            -exportPath menubar/build/export \
            -exportOptionsPlist menubar/exportOptions.plist

      # REL-001: Code signing and notarization (requires Apple Developer Program)
      # TODO: Uncomment after obtaining Apple Developer Program membership and configuring secrets
      #
      # - name: Import signing certificate
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #
      # - name: Notarize app
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #   run: |
      #     xcrun notarytool submit BrewBar.app.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
      #     xcrun stapler staple menubar/build/export/BrewBar.app

      # QA-017: Preserve dSYM for crash symbolication
      - name: Preserve dSYM
        run: |
          cp -R menubar/build/BrewBar.xcarchive/dSYMs/BrewBar.app.dSYM .
          zip -r BrewBar.dSYM.zip BrewBar.app.dSYM

      - name: Package BrewBar.app
        run: |
          ditto -c -k --keepParent menubar/build/export/BrewBar.app BrewBar.app.zip

      # SEG-001: Generate SHA-256 checksum for integrity verification
      - name: Generate SHA-256 checksum
        run: |
          shasum -a 256 BrewBar.app.zip > BrewBar.app.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrewBar
          path: |
            BrewBar.app.zip
            BrewBar.app.zip.sha256
            BrewBar.dSYM.zip

  # Create GitHub Release with BrewBar.app.zip, checksum, and dSYM
  create-release:
    runs-on: ubuntu-latest
    needs: [publish-npm, build-brewbar]
    steps:
      - uses: actions/checkout@v4
      - name: Download BrewBar artifact
        uses: actions/download-artifact@v4
        with:
          name: BrewBar
      - name: Create Release
        # SEG-005: Pin action by SHA (softprops/action-gh-release@v2)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BrewBar.app.zip
            BrewBar.app.zip.sha256
            BrewBar.dSYM.zip
          generate_release_notes: true

            - generic [ref=e83]:
              - heading "Why I built Brew-TUI" [level=2] [ref=e84]:
                - link:
                  - /url: "#why-i-built-brewtui"
                - text: Why I built Brew-TUI
              - paragraph [ref=e85]:
                - text: If you're a macOS developer, you probably use
                - link "Homebrew" [ref=e86] [cursor=pointer]:
                  - /url: https://brew.sh
                - text: every day. But memorizing all the
                - code [ref=e87]: brew
                - text: commands gets old — especially when you just want to see what's outdated, upgrade a few packages, or check if a service is running.
              - paragraph [ref=e88]:
                - text: So I built
                - strong [ref=e89]: Brew-TUI
                - text: ": a full visual terminal UI for Homebrew."
              - heading "What it looks like" [level=2] [ref=e90]:
                - link:
                  - /url: "#what-it-looks-like"
                - text: What it looks like
              - paragraph [ref=e91]:
                - text: It's a keyboard-driven TUI built with
                - strong [ref=e92]: React 18 + Ink 5
                - text: (terminal renderer) and
                - strong [ref=e93]: Zustand
                - text: "for state management. You get:"
              - list [ref=e94]:
                - listitem [ref=e95]:
                  - strong [ref=e96]: Dashboard
                  - text: — package stats, outdated counts, services, system info at a glance
                - listitem [ref=e97]:
                  - strong [ref=e98]: Installed
                  - text: — browse and filter all formulae and casks with version info
                - listitem [ref=e99]:
                  - strong [ref=e100]: Search
                  - text: — find and install packages without leaving the TUI
                - listitem [ref=e101]:
                  - strong [ref=e102]: Outdated
                  - text: — see version diffs, upgrade one by one or all at once
                - listitem [ref=e103]:
                  - strong [ref=e104]: Services
                  - text: — start/stop/restart Homebrew services
                - listitem [ref=e105]:
                  - strong [ref=e106]: Doctor
                  - text: — run
                  - code [ref=e107]: brew doctor
                  - text: and see warnings
                - listitem [ref=e108]:
                  - strong [ref=e109]: Package Info
                  - text: — dependencies, caveats, quick actions
              - paragraph [ref=e110]:
                - text: Navigate with
                - code [ref=e111]: 1-0
                - text: to jump to views,
                - code [ref=e112]: j/k
                - text: to scroll,
                - code [ref=e113]: /
                - text: to search,
                - code [ref=e114]: Tab
                - text: to cycle. Press
                - code [ref=e115]: L
                - text: to switch between English and Spanish.
              - heading "The tech stack" [level=2] [ref=e116]:
                - link:
                  - /url: "#the-tech-stack"
                - text: The tech stack
              - list [ref=e117]:
                - listitem [ref=e118]:
                  - strong [ref=e119]: TypeScript
                  - text: (strict mode, ESM-only)
                - listitem [ref=e120]:
                  - strong [ref=e121]: React 18
                  - text: for the component tree
                - listitem [ref=e122]:
                  - strong [ref=e123]: Ink 5
                  - text: as the terminal renderer (
                  - code [ref=e124]: <Box>
                  - text: = flexbox,
                  - code [ref=e125]: <Text>
                  - text: = styled output)
                - listitem [ref=e126]:
                  - strong [ref=e127]: Zustand
                  - text: for state management
                - listitem [ref=e128]:
                  - strong [ref=e129]: tsup
                  - text: for building
              - paragraph [ref=e130]: "The data flow is: Views → Zustand stores → brew-api → Parsers → brew CLI (spawn). Streaming operations (install, upgrade) use an AsyncGenerator that yields lines in real time."
              - heading "Pro features" [level=2] [ref=e131]:
                - link:
                  - /url: "#pro-features"
                - text: Pro features
              - paragraph [ref=e132]: "There's also a freemium tier with:"
              - list [ref=e133]:
                - listitem [ref=e134]:
                  - strong [ref=e135]: Profiles
                  - text: — export/import your Homebrew setup across machines
                - listitem [ref=e136]:
                  - strong [ref=e137]: Smart Cleanup
                  - text: — find orphan packages and reclaim disk space
                - listitem [ref=e138]:
                  - strong [ref=e139]: History
                  - text: — track every install/uninstall/upgrade
                - listitem [ref=e140]:
                  - strong [ref=e141]: Security Audit
                  - text: — scan packages against the OSV vulnerability database
                - listitem [ref=e142]:
                  - strong [ref=e143]: BrewBar
                  - text: — a macOS menu bar companion app (Swift 6 / SwiftUI) that shows outdated counts and lets you upgrade from the menu bar

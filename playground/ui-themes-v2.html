<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew-TUI Structural Theme Explorer v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; height: 100vh; }
.controls { width: 280px; padding: 20px; border-right: 1px solid #222; overflow-y: auto; flex-shrink: 0; }
.controls h2 { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.controls p { font-size: 11px; color: #555; margin-bottom: 16px; line-height: 1.5; }
.theme-btn { display: block; width: 100%; padding: 14px 16px; margin-bottom: 10px; border: 2px solid #222; border-radius: 8px; background: #111; color: #ccc; font-size: 13px; cursor: pointer; text-align: left; transition: all 0.2s; }
.theme-btn:hover { border-color: #444; background: #1a1a1a; }
.theme-btn.active { border-color: #64ffda; color: #fff; background: #0d1f3c; }
.theme-btn strong { display: block; margin-bottom: 4px; }
.theme-btn small { display: block; font-size: 10px; color: #556; line-height: 1.4; }
.theme-btn.active small { color: #4a6a8b; }
.tag { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-right: 4px; margin-top: 6px; }

.preview-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.preview-header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
.preview-header h1 { font-size: 15px; color: #888; }
.preview-header span { font-size: 12px; color: #64ffda; }

.terminal-frame { flex: 1; margin: 12px; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #1a3050; }
.terminal-bar { height: 30px; background: #0d1f3c; display: flex; align-items: center; padding: 0 12px; gap: 6px; }
.terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
.terminal-body { flex: 1; padding: 8px 12px; font-family: 'SF Mono', 'Fira Code', Menlo, monospace; font-size: 11.5px; line-height: 1.55; overflow-y: auto; white-space: pre; background: #0a192f; }

.prompt-area { padding: 12px 20px; border-top: 1px solid #222; }
.prompt-area h3 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.prompt-text { font-family: monospace; font-size: 11px; color: #8892b0; background: #0d1117; padding: 10px; border-radius: 6px; white-space: pre-wrap; max-height: 100px; overflow-y: auto; line-height: 1.5; }
.copy-btn { margin-top: 8px; padding: 5px 14px; background: #1a3050; border: 1px solid #2a4a6b; color: #64ffda; border-radius: 4px; cursor: pointer; font-size: 11px; }
.copy-btn:hover { background: #2a4a6b; }
.copy-btn.copied { color: #4ade80; border-color: #4ade80; }
</style>
</head>
<body>

<div class="controls">
  <h2>Structure Variants</h2>
  <p>Based on Ocean Premium. Same palette, radically different layouts and morphology.</p>
  <div id="btns"></div>
</div>

<div class="preview-area">
  <div class="preview-header">
    <h1>Structural Theme Explorer</h1>
    <span id="tname"></span>
  </div>
  <div class="terminal-frame">
    <div class="terminal-bar">
      <div class="terminal-dot" style="background:#ff6b6b"></div>
      <div class="terminal-dot" style="background:#ffd93d"></div>
      <div class="terminal-dot" style="background:#6bff6b"></div>
      <span style="font-size:11px;color:#4a6a8b;margin-left:8px;font-family:monospace">brew-tui</span>
    </div>
    <div class="terminal-body" id="out"></div>
  </div>
  <div class="prompt-area">
    <h3>Implementation Prompt</h3>
    <div class="prompt-text" id="prompt"></div>
    <button class="copy-btn" id="cbtn" onclick="copyP()">Copy Prompt</button>
  </div>
</div>

<script>
const S = (c,t) => `<span style="color:${c}">${t}</span>`;
const B = (c,t) => `<span style="color:${c};font-weight:bold">${t}</span>`;
const DIM = (c,t) => `<span style="color:${c};opacity:0.5">${t}</span>`;
const BG = (bg,fg,t) => `<span style="background:${bg};color:${fg};padding:0 4px">${t}</span>`;

const LOGO = [
  '\u256D\u2501\u2501\u256E\u2571\u256D\u2501\u2501\u2501\u256E\u256D\u2501\u2501\u2501\u256E\u256D\u256E\u256D\u256E\u256D\u256E\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u256D\u2501\u2501\u2501\u2501\u256E\u256D\u256E\u2571\u256D\u256E\u256D\u2501\u2501\u256E',
  '\u2503\u256D\u256E\u2503\u2571\u2503\u256D\u2501\u256E\u2503\u2503\u256D\u2501\u2501\u256F\u2503\u2503\u2503\u2503\u2503\u2503\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u2503\u256D\u256E\u256D\u256E\u2503\u2503\u2503\u2571\u2503\u2503\u2570\u252B\u2523\u256F',
  '\u2503\u2570\u256F\u2570\u256E\u2503\u2570\u2501\u256F\u2503\u2503\u2570\u2501\u2501\u256E\u2503\u2503\u2503\u2503\u2503\u2503\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u2570\u256F\u2503\u2503\u2570\u256F\u2503\u2503\u2571\u2503\u2503\u2571\u2503\u2503',
  '\u2503\u256D\u2501\u256E\u2503\u2503\u256D\u256E\u256D\u256F\u2503\u256D\u2501\u2501\u256F\u2503\u2570\u256F\u2570\u256F\u2503\u256D\u2501\u2501\u2533\u2501\u2501\u256E\u2571\u2571\u2503\u2503\u2571\u2571\u2503\u2503\u2571\u2503\u2503\u2571\u2503\u2503',
  '\u2503\u2570\u2501\u256F\u2503\u2503\u2503\u2503\u2570\u256E\u2503\u2570\u2501\u2501\u256E\u2570\u256E\u256D\u256E\u256D\u256F\u2570\u2501\u2501\u253B\u2501\u2501\u256F\u2571\u2571\u2503\u2503\u2571\u2571\u2503\u2570\u2501\u256F\u2503\u256D\u252B\u2523\u256E',
  '\u2570\u2501\u2501\u2501\u256F\u2570\u256F\u2570\u2501\u256F\u2570\u2501\u2501\u2501\u256F\u2571\u2570\u256F\u2570\u256F\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u2571\u2570\u256F\u2571\u2571\u2570\u2501\u2501\u2501\u256F\u2570\u2501\u2501\u256F',
];

const pkgs = [
  {n:'git',o:'2.43.0',v:'2.45.1'},
  {n:'node',o:'20.11.0',v:'22.2.0'},
  {n:'python@3.12',o:'3.12.2',v:'3.12.4'},
  {n:'wget',o:'1.21.4',v:'1.24.5'},
  {n:'ffmpeg',o:'6.1.1',v:'7.0'},
];

let cur = 'panels';

const defs = {
  panels: {
    name: 'Split Panels',
    desc: 'Dashboard split into distinct panels with thick borders. Stats on top row, outdated as a separate framed panel below. Each section is a box.',
    tags: ['panels','framed','grid'],
    render() {
      let L = [];
      // Compact logo
      LOGO.forEach(l => { const m=28; L.push(' '+S('#64ffda',l.slice(0,m))+S('#0ea5e9',l.slice(m))); });
      // Tabs as pill badges
      L.push('');
      const tabs = ['Dashboard','Installed','Search','Outdated','Services','Doctor','Profiles','Cleanup','History','Security','Account'];
      let tl = ' ';
      tabs.forEach((t,i) => {
        if (i>0) tl += ' ';
        if (i===0) tl += BG('#1a3a5a','#64ffda',' '+t+' ');
        else if (i>=6&&i<=9) tl += S('#2a4a6b',t)+' '+S('#ff6b9d','PRO');
        else tl += S('#2a4a6b',t);
      });
      L.push(tl);
      L.push('');

      // Stats panel - horizontal boxes
      const hb = '\u2501', vb = '\u2503';
      const stats = [{l:'Formulae',v:'142',c:'#64ffda'},{l:'Casks',v:'38',c:'#a78bfa'},{l:'Outdated',v:'5',c:'#fbbf24'},{l:'Services',v:'3/7',c:'#34d399'}];

      // Top border
      let top = ' ';
      stats.forEach((s,i) => {
        if (i>0) top += S('#1a3050','\u2533');
        top += S(s.c,'\u256D'+hb.repeat(16)+'\u256E');
      });
      L.push(top);
      // Values
      let vl = ' ';
      stats.forEach((s,i) => {
        if (i>0) vl += S('#1a3050',vb);
        const pad = Math.floor((16-s.v.length)/2);
        vl += S(s.c,vb)+B(s.c,' '.repeat(pad)+s.v+' '.repeat(16-s.v.length-pad))+S(s.c,vb);
      });
      L.push(vl);
      // Labels
      let ll = ' ';
      stats.forEach((s,i) => {
        if (i>0) ll += S('#1a3050',vb);
        const pad = Math.floor((16-s.l.length)/2);
        ll += S(s.c,vb)+S('#4a6a8b',' '.repeat(pad)+s.l+' '.repeat(16-s.l.length-pad))+S(s.c,vb);
      });
      L.push(ll);
      // Bottom border
      let bot = ' ';
      stats.forEach((s,i) => {
        if (i>0) bot += S('#1a3050','\u253B');
        bot += S(s.c,'\u2570'+hb.repeat(16)+'\u256F');
      });
      L.push(bot);
      L.push('');

      // Outdated panel - full-width framed box
      const pw = 72;
      L.push(' '+S('#fbbf24','\u256D'+'\u2501'.repeat(pw)+'\u256E'));
      L.push(' '+S('#fbbf24','\u2503')+' '+B('#fbbf24','\u{1F4E6} Outdated Packages')+' '.repeat(pw-22)+S('#fbbf24','\u2503'));
      L.push(' '+S('#fbbf24','\u2503')+S('#1a3050','\u2500'.repeat(pw))+S('#fbbf24','\u2503'));
      pkgs.forEach((p,i) => {
        const cur = i===0 ? S('#64ffda','\u25B6') : ' ';
        const nm = i===0 ? B('#ccd6f6',p.n.padEnd(18)) : S('#ccd6f6',p.n.padEnd(18));
        const line = cur+' '+nm+S('#ff6b6b',p.o.padEnd(10))+S('#4a6a8b',' \u2500\u25B6 ')+S('#64ffda',p.v);
        const vis = p.n.length>18?18:p.n.length; // approximate
        const content = ' '+line;
        L.push(' '+S('#fbbf24','\u2503')+content+' '.repeat(Math.max(0,pw-42))+S('#fbbf24','\u2503'));
      });
      L.push(' '+S('#fbbf24','\u2570'+'\u2501'.repeat(pw)+'\u256F'));
      L.push('');

      // Footer
      L.push(' '+S('#1a3050','\u2500'.repeat(pw+2)));
      L.push(' '+B('#ccd6f6','enter')+S('#1a3050',':')+S('#64ffda','upgrade')+S('#1a3050',' \u2502 ')+B('#ccd6f6','A')+S('#1a3050',':')+S('#64ffda','all')+S('#1a3050',' \u2502 ')+B('#ccd6f6','p')+S('#1a3050',':')+S('#64ffda','pin')+S('#1a3050',' \u2502 ')+B('#ccd6f6','q')+S('#1a3050',':')+S('#64ffda','quit')+S('#1a3050',' \u2502 ')+B('#ccd6f6','L')+S('#1a3050',':')+S('#64ffda','lang(en)'));
      return L.join('\n');
    },
    prompt: `Implement "Split Panels" layout for Brew-TUI:
- Each section (stats, outdated, system info) lives inside its own bordered panel/box
- Stats are in a CONNECTED horizontal grid: 4 cells sharing borders (like a table row)
- Each cell has its own color for the border matching the stat type
- Outdated section is a full-width framed box with a header row and separator line inside
- Tabs rendered as pill-style badges (active tab has background highlight, not underline)
- Sections are visually separated by thick framed borders, not just whitespace
- Footer has a top border line
- Ocean palette: bg #0a192f, mint #64ffda, sky #0ea5e9, purple #a78bfa, pink #ff6b9d, gold #fbbf24`
  },

  dashboard: {
    name: 'Command Center',
    desc: 'Military-style heads-up display. Stats as horizontal gauges/bars. Status indicators with blinking dots. Dense information layout.',
    tags: ['HUD','gauges','dense'],
    render() {
      let L = [];
      // Mini logo - single line
      L.push(' '+B('#64ffda','BREW')+S('#0ea5e9','-')+B('#0ea5e9','TUI')+S('#1a3050',' \u2502 ')+S('#4a6a8b','v0.1.0')+S('#1a3050',' \u2502 ')+S('#34d399','\u25CF')+S('#4a6a8b',' System OK')+S('#1a3050',' \u2502 ')+S('#4a6a8b','Last update: 2m ago'));
      L.push(S('#0ea5e9','\u2550'.repeat(90)));
      // Navigation as numbered shortcuts
      L.push(' '+BG('#1a3a5a','#64ffda',' 1 DASH ')+' '+S('#2a4a6b','2 INST')+' '+S('#2a4a6b','3 SRCH')+' '+S('#2a4a6b','4 OUTD')+' '+S('#2a4a6b','5 SVCS')+' '+S('#2a4a6b','6 DOC')+' '+S('#ff6b9d','7 PROF')+' '+S('#ff6b9d','8 CLN')+' '+S('#ff6b9d','9 HIST')+' '+S('#ff6b9d','0 SEC'));
      L.push(S('#1a3050','\u2500'.repeat(90)));
      L.push('');

      // Stats as horizontal progress bars
      const bars = [
        {l:'FORMULAE',v:142,max:200,c:'#64ffda'},
        {l:'CASKS   ',v:38,max:60,c:'#a78bfa'},
        {l:'OUTDATED',v:5,max:142,c:'#fbbf24',warn:true},
        {l:'SERVICES',v:3,max:7,c:'#34d399',fmt:'3/7'},
      ];
      L.push(' '+B('#8892b0','\u2500\u2500\u2500 SYSTEM STATUS \u2500'.repeat(1)+'\u2500'.repeat(50)));
      L.push('');
      bars.forEach(b => {
        const pct = b.v/b.max;
        const bw = 40;
        const filled = Math.round(pct*bw);
        const bar = S(b.c,'\u2588'.repeat(filled))+S('#1a3050','\u2591'.repeat(bw-filled));
        const val = b.fmt || String(b.v);
        const dot = b.warn ? S('#fbbf24','\u25CF') : S('#34d399','\u25CF');
        L.push('  '+dot+' '+S('#4a6a8b',b.l)+' '+bar+' '+B(b.c,val.padStart(4)));
      });
      L.push('');

      // Outdated as compact table
      L.push(' '+B('#8892b0','\u2500\u2500\u2500 OUTDATED PACKAGES \u2500'.repeat(1)+'\u2500'.repeat(47)));
      L.push('');
      L.push('  '+S('#4a6a8b','#  PACKAGE          CURRENT     AVAILABLE   STATUS'));
      L.push('  '+S('#1a3050','\u2500'.repeat(65)));
      pkgs.forEach((p,i) => {
        const num = S('#4a6a8b',String(i+1).padStart(2));
        const nm = i===0 ? B('#ccd6f6',p.n.padEnd(18)) : S('#ccd6f6',p.n.padEnd(18));
        const st = S('#fbbf24','\u25B2 update');
        L.push('  '+num+' '+nm+S('#ff6b6b',p.o.padEnd(12))+S('#64ffda',p.v.padEnd(12))+st);
      });
      L.push('');
      L.push(S('#0ea5e9','\u2550'.repeat(90)));
      L.push(' '+B('#ccd6f6','RET')+S('#1a3050',':')+S('#64ffda','upgrade')+' '+B('#ccd6f6','A')+S('#1a3050',':')+S('#64ffda','all')+' '+B('#ccd6f6','p')+S('#1a3050',':')+S('#64ffda','pin')+' '+B('#ccd6f6','r')+S('#1a3050',':')+S('#64ffda','refresh')+' '+B('#ccd6f6','q')+S('#1a3050',':')+S('#64ffda','quit'));
      return L.join('\n');
    },
    prompt: `Implement "Command Center" layout for Brew-TUI:
- Logo replaced with a single-line status bar: "BREW-TUI | v0.1.0 | System OK | Last update: 2m ago"
- Navigation as compact numbered badges (1 DASH, 2 INST, etc.) - abbreviated labels
- Stats displayed as HORIZONTAL PROGRESS BARS with fill characters (\u2588/\u2591), percentage fill, and value
- Each bar has a status dot indicator (green=ok, yellow=warning)
- Section headers use "--- TITLE ---" military style with dashes
- Outdated shown as a numbered TABLE with columns: #, Package, Current, Available, Status
- Dense information layout - minimal whitespace, maximum data density
- Double-line borders (\u2550) for major separators
- Ocean palette with HUD aesthetic`
  },

  cards: {
    name: 'Card Stack',
    desc: 'Each package is a full card with details. Vertical scroll. Stats as inline badges in header. No table layout - everything is cards.',
    tags: ['cards','vertical','detailed'],
    render() {
      let L = [];
      // Logo small
      LOGO.slice(0,3).forEach(l => { const m=28; L.push(S('#64ffda',l.slice(0,m))+S('#0ea5e9',l.slice(m))); });
      L.push('');
      // Header with inline stat badges
      L.push(' '+BG('#143040','#64ffda',' \u{1F4E6} 142 formulae ')+' '+BG('#1a2850','#a78bfa',' \u{1F37A} 38 casks ')+' '+BG('#2a2010','#fbbf24',' \u26A0 5 outdated ')+' '+BG('#102a20','#34d399',' \u2699 3/7 services '));
      L.push('');
      L.push(' '+S('#2a4a6b','Dashboard')+S('#1a3050',' \u203A ')+B('#64ffda','Outdated')+S('#1a3050',' \u203A ')+S('#2a4a6b','...')+' '.repeat(30)+S('#4a6a8b','5 packages need attention'));
      L.push(S('#1a3050',' \u2500'.repeat(44)));
      L.push('');

      // Package cards - each is a mini box
      pkgs.forEach((p,i) => {
        const active = i===0;
        const bc = active ? '#64ffda' : '#1a3050';
        const w = 60;
        L.push(' '+S(bc,'\u256D'+'\u2501'.repeat(w)+'\u256E'));
        // Card header
        const arrow = S('#4a6a8b',' \u2192 ');
        const name = active ? B('#ccd6f6',p.n) : S('#8892b0',p.n);
        const ver = S('#ff6b6b',p.o)+arrow+B('#64ffda',p.v);
        const badge = S('#fbbf24',' \u25B2 UPDATE');
        L.push(' '+S(bc,'\u2503')+' '+name+' '.repeat(Math.max(1,28-p.n.length))+ver+badge+' '.repeat(Math.max(0,w-50))+S(bc,'\u2503'));
        // Card detail line
        const detail = S('#2a4a6b','  Homebrew/core \u2502 Stable \u2502 Bottle available');
        L.push(' '+S(bc,'\u2503')+detail+' '.repeat(Math.max(0,w-46))+S(bc,'\u2503'));
        L.push(' '+S(bc,'\u2570'+'\u2501'.repeat(w)+'\u256F'));
        if (i < pkgs.length-1) L.push('');
      });

      L.push('');
      L.push(S('#1a3050',' \u2500'.repeat(62)));
      L.push(' '+B('#ccd6f6','enter')+S('#1a3050',':')+S('#64ffda','details')+' '+B('#ccd6f6','u')+S('#1a3050',':')+S('#64ffda','upgrade')+' '+B('#ccd6f6','A')+S('#1a3050',':')+S('#64ffda','all')+' '+B('#ccd6f6','q')+S('#1a3050',':')+S('#64ffda','quit'));
      return L.join('\n');
    },
    prompt: `Implement "Card Stack" layout for Brew-TUI:
- Logo shown in compact form (3 lines instead of 6)
- Stats displayed as INLINE BADGES in a single row (colored background pills): "142 formulae | 38 casks | 5 outdated | 3/7 services"
- Breadcrumb navigation instead of tab bar: "Dashboard > Outdated > ..."
- Each outdated package is a FULL BORDERED CARD (not a table row):
  - Card header: package name + version comparison + UPDATE badge
  - Card detail line: tap source, channel, bottle status
  - Active card has bright border, inactive cards have dim border
  - Cards stacked vertically with spacing between them
- No table layout anywhere - everything is individual cards
- Footer hints at bottom
- Ocean palette with card-based information architecture`
  },

  split: {
    name: 'Sidebar + Main',
    desc: 'Left sidebar with navigation and stats. Main area with content. Like a file manager or IDE layout. Two-column split.',
    tags: ['sidebar','split','IDE'],
    render() {
      let L = [];
      const sw = 24; // sidebar width
      const mw = 52; // main width
      const vb = S('#1a3050','\u2502');

      // Top bar
      L.push(S('#0ea5e9',' BREW-TUI')+' '.repeat(sw-9)+S('#1a3050','\u2502')+' '+B('#64ffda','Dashboard')+' '.repeat(mw-11));
      L.push(S('#1a3050','\u2500'.repeat(sw)+'\u253C'+'\u2500'.repeat(mw+1)));

      // Sidebar: nav items
      const nav = [
        {i:'\u{1F4CA}',n:'Dashboard',a:true},
        {i:'\u{1F4E6}',n:'Installed',a:false},
        {i:'\u{1F50D}',n:'Search',a:false},
        {i:'\u26A0\uFE0F',n:'Outdated',a:false,badge:'5'},
        {i:'\u2699\uFE0F',n:'Services',a:false},
        {i:'\u{1FA7A}',n:'Doctor',a:false},
        {i:'',n:'',a:false,sep:true},
        {i:'\u{1F4C1}',n:'Profiles',a:false,pro:true},
        {i:'\u{1F9F9}',n:'Cleanup',a:false,pro:true},
        {i:'\u{1F4DC}',n:'History',a:false,pro:true},
        {i:'\u{1F6E1}',n:'Security',a:false,pro:true},
      ];

      // Main content lines (right side)
      const mainLines = [];
      mainLines.push('');
      mainLines.push(' '+B('#64ffda','Overview'));
      mainLines.push('');
      mainLines.push(' '+S('#64ffda','142')+S('#4a6a8b',' formulae  ')+S('#a78bfa','38')+S('#4a6a8b',' casks'));
      mainLines.push(' '+S('#fbbf24','5')+S('#4a6a8b','   outdated ')+S('#34d399','3')+S('#4a6a8b','/7 services'));
      mainLines.push('');
      mainLines.push(' '+S('#1a3050','\u2500'.repeat(mw-2)));
      mainLines.push(' '+B('#fbbf24','\u{1F4E6} Outdated'));
      mainLines.push('');
      pkgs.forEach((p,i) => {
        const c = i===0 ? S('#64ffda','\u25B6') : ' ';
        const nm = i===0 ? B('#ccd6f6',p.n.padEnd(15)) : S('#8892b0',p.n.padEnd(15));
        mainLines.push(' '+c+' '+nm+S('#ff6b6b',p.o.padEnd(9))+S('#4a6a8b','\u2192 ')+S('#64ffda',p.v));
      });
      mainLines.push('');
      mainLines.push(' '+S('#1a3050','\u2500'.repeat(mw-2)));
      mainLines.push(' '+S('#4a6a8b','Homebrew 5.1.6 \u2502 /opt/homebrew'));

      // Render combined
      const totalRows = Math.max(nav.length, mainLines.length);
      for (let r = 0; r < totalRows; r++) {
        let left = ' '.repeat(sw);
        if (r < nav.length) {
          const item = nav[r];
          if (item.sep) {
            left = S('#1a3050',' '+'\u2500'.repeat(sw-2)+' ');
          } else {
            const icon = item.i ? item.i+' ' : '  ';
            if (item.a) {
              left = BG('#1a3a5a','#64ffda',' '+icon+item.n)+' '.repeat(Math.max(0,sw-item.n.length-4));
            } else {
              let line = ' '+S('#4a6a8b',icon)+S('#8892b0',item.n);
              if (item.badge) line += ' '+S('#fbbf24',item.badge);
              if (item.pro) line += ' '+S('#ff6b9d','\u2022');
              left = line + ' '.repeat(Math.max(0,sw-item.n.length-(item.badge?2:0)-(item.pro?2:0)-4));
            }
          }
        }
        const right = r < mainLines.length ? mainLines[r] : '';
        L.push(left+vb+right);
      }

      L.push(S('#1a3050','\u2500'.repeat(sw)+'\u2534'+'\u2500'.repeat(mw+1)));
      L.push(' '+B('#ccd6f6','1-0')+S('#1a3050',':')+S('#64ffda','nav')+' '+B('#ccd6f6','enter')+S('#1a3050',':')+S('#64ffda','select')+' '+B('#ccd6f6','q')+S('#1a3050',':')+S('#64ffda','quit')+' '.repeat(20)+S('#4a6a8b','L:lang(en)'));
      return L.join('\n');
    },
    prompt: `Implement "Sidebar + Main" layout for Brew-TUI:
- TWO-COLUMN LAYOUT: left sidebar (24 chars) + main content area, separated by a vertical line
- Sidebar contains:
  - App name at top
  - Navigation list with emoji icons and labels
  - Active item has background highlight
  - Outdated shows a badge count "5"
  - Pro items marked with a colored dot
  - Separator line between free and pro items
- Main area contains:
  - Section title at top
  - Stats as inline numbers (not cards): "142 formulae  38 casks"
  - Horizontal rule separator
  - Package list below
  - System info at the bottom
- Breadcrumb path in the header row
- Footer spans full width below both columns
- Like an IDE or file manager layout
- Ocean palette with structural two-column split`
  },
};

function render() {
  const d = defs[cur];
  document.getElementById('tname').textContent = d.name;
  document.getElementById('out').innerHTML = d.render();
  document.getElementById('prompt').textContent = d.prompt;
}

function copyP() {
  navigator.clipboard.writeText(document.getElementById('prompt').textContent).then(() => {
    const b = document.getElementById('cbtn');
    b.textContent = 'Copied!'; b.classList.add('copied');
    setTimeout(() => { b.textContent = 'Copy Prompt'; b.classList.remove('copied'); }, 2000);
  });
}

const bc = document.getElementById('btns');
Object.entries(defs).forEach(([k,d]) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn'+(k===cur?' active':'');
  btn.innerHTML = `<strong>${d.name}</strong><small>${d.desc}</small><div>${d.tags.map(t=>`<span class="tag" style="background:#1a3050;color:#64ffda">${t}</span>`).join('')}</div>`;
  btn.onclick = () => {
    cur = k;
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  bc.appendChild(btn);
});

render();
</script>
</body>
</html>
